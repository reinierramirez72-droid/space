<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xat Space - Rei</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="xat-space-container" onclick="iniciarMusicaoculta()">

        <div class="xat-stars"></div>

        <div class="xat-shooting"></div>
        <div class="xat-shooting"></div>
        <div class="xat-shooting"></div>

        <div class="xat-center-block">
            <h1 class="xat-name-rei">Rei</h1>
            <div class="xat-divider">
                <div class="xat-diamond"></div>
            </div>
        </div>

        <div class="xat-player-controls">
            <div class="xat-btn" id="xat-play-trigger" onclick="reproducirAudio(event)">
                <div class="xat-icon-play"></div>
            </div>
            
            <span class="xat-separator">|</span>
            
            <div class="xat-btn" id="xat-pause-trigger" onclick="pausarAudio(event)">
                <div class="xat-icon-pause"></div>
            </div>
        </div>

        <audio id="xat-bg-audio" loop>
    <source src="https://TU_USUARIO.github.io/TU_REPOSITORIO/cancion.mp3" type="audio/mpeg">
    Tu navegador no soporta este elemento de audio.
        </audio>

    </div>

    <script>
        const miAudio = document.getElementById('xat-bg-audio');

        // Función 1: Clic general en la pantalla (intenta arrancar el audio de fondo)
        function iniciarMusicaoculta() {
            if (miAudio.paused) {
                miAudio.play().catch(error => {
                    console.log("Esperando interacción directa con los botones.");
                });
            }
        }

        // Función 2: Clic específico en el botón de PLAY
        function reproducirAudio(event) {
            event.stopPropagation(); // Evita que se duplique el evento con el clic del fondo
            miAudio.play();
        }

        // Función 3: Clic específico en el botón de PAUSE
        function pausarAudio(event) {
            event.stopPropagation(); // Evita que se duplique el evento con el clic del fondo
            miAudio.pause();
        }
    </script>

</body>
</html>
