<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xat Space - Rei</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="xat-space-container">

        <iframe class="xat-audio-player" 
                src="https://www.youtube.com/embed/328Z3b77k6Y?autoplay=1&mute=1&loop=1&playlist=328Z3b77k6Y" 
                allow="autoplay">
        </iframe>

        <div class="xat-stars"></div>

        <div class="xat-shooting"></div>
        <div class="xat-shooting"></div>
        <div class="xat-shooting"></div>

        <div class="xat-center-block">
            <h1 class="xat-name-rei">Rei</h1>
            <div class="xat-divider">
                <div class="xat-diamond"></div>
            </div>
        </div>

        <div class="xat-player-controls">
            <div class="xat-btn"><div class="xat-icon-play"></div></div>
            <span class="xat-separator">|</span>
            <div class="xat-btn"><div class="xat-icon-pause"></div></div>
        </div>

    </div>

</body>
</html>
